<html>

<head>
    <style>
        .button {
            display: inline-block;
            border-radius: 4px;
            background-color: #f4511e;
            border: none;
            color: #FFFFFF;
            text-align: center;
            font-size: 28px;
            padding: 20px;
            width: 200px;
            transition: all 0.5s;
            cursor: pointer;
            margin: 5px;
        }

        .button span {
            cursor: pointer;
            display: inline-block;
            position: relative;
            transition: 0.5s;
        }

        .button span:after {
            content: '\00bb';
            position: absolute;
            opacity: 0;
            top: 0;
            right: -20px;
            transition: 0.5s;
        }

        .button:hover span {
            padding-right: 25px;
        }

        .button:hover span:after {
            opacity: 1;
            right: 0;
        }
    </style>
    <style>
        .kun{
            display: none;
            position:fixed;
        }
    </style>
    <title>ikunikunikunikunikunikunikunikunikunikunikunikunikunikunikunikunikunikunikun</title>
</head>

<body>
    <div id="b"><button onclick="game()" class="button">开始游戏</button></div>
    <embed src="" hidden="true" id="music" autostart=true></embed>
    <div style="position: fixed;height: 100%;width: 100%;" id="main">
        <div class="kun" id="1"><button onclick="boom(1)"><img src="kun.png" /></button></div>
        <div class="kun" id="2"><button onclick="boom(2)"><img src="kun.png" /></button></div>
        <div class="kun" id="3"><button onclick="boom(3)"><img src="kun.png" /></button></div>
        <div class="kun" id="4"><button onclick="boom(4)"><img src="kun.png" /></button></div>
        <div class="kun" id="5"><button onclick="boom(5)"><img src="kun.png" /></button></div>
        <div class="kun" id="6"><button onclick="boom(6)"><img src="kun.png" /></button></div>
        <div class="kun" id="7"><button onclick="boom(7)"><img src="kun.png" /></button></div>
        <div class="kun" id="8"><button onclick="boom(8)"><img src="kun.png" /></button></div>
        <div class="kun" id="9"><button onclick="boom(9)"><img src="kun.png" /></button></div>
        <div class="kun" id="10"><button onclick="boom(10)"><img src="kun.png" /></button></div>
    </div>
</body>
<script>
    var int = setInterval(function()
    {
        var k=document.getElementsByClassName("kun");
        for (var i = 0; i < k.length; i++) {
            k[i].style.top=((parseFloat(k[i].style.top)+0.1)+"%");
            if(parseFloat(k[i].style.top)+0.1>=100)
            {
                k[i].style.top="0%";
            }
        }
    },1);
    function game()
    {
        document.getElementById("b").innerHTML="";
        setkun();
        
    }
    function setkun(){
        var kk=document.getElementsByClassName("kun");
        for (var i = 0; i < kk.length; i++) {
           kk[i].style.display = "block";
           kk[i].style.top = Math.floor(Math.random() * (101)).toString()+"%";
           kk[i].style.left = Math.floor(Math.random() * (101)).toString()+"%";
        };
    }
    function boom(id){
        var music = document.getElementById("music");
        music.src="你干嘛.mp3";
        setTimeout(3000);
        music.src="";
        var k=document.getElementById(id.toString());
        k.style.top=Math.floor(Math.random() * (101)).toString()+"%";
        k.style.top=Math.floor(Math.random() * (101)).toString()+"%";
    }
</script>

</html>
